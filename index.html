<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מאקס — דשבורד פיננסי</title>
<style>
  :root{
    --bg:#0e1116; --card:#161b22; --card2:#1c2230; --line:#272e3a;
    --txt:#e6edf3; --dim:#8b949e; --accent:#2ea043; --accent2:#3b82f6;
    --warn:#d29922; --red:#f85149;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Heebo,Arial,sans-serif;
    line-height:1.5; padding-bottom:90px;}
  .hidden{display:none!important;}
  a{color:var(--accent2);}

  /* setup */
  #setup{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
  .setup-box{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:28px 22px; width:100%; max-width:380px; text-align:center;}
  .setup-logo{font-size:42px;}
  .setup-title{font-size:22px; font-weight:700; margin:6px 0;}
  .setup-sub{color:var(--dim); font-size:14px; margin-bottom:18px;}
  .setup-label{display:block; text-align:right; font-size:13px; color:var(--dim); margin:12px 0 5px;}
  .setup-input{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:10px; color:var(--txt); padding:11px; font-size:15px;}
  .setup-btn{width:100%; background:var(--accent); color:#fff; border:0; border-radius:10px; padding:13px; font-size:16px; font-weight:600; margin-top:18px;}
  .setup-err{color:var(--red); font-size:13px; margin-top:10px; display:none;}
  .setup-help{color:var(--dim); font-size:12px; margin-top:16px; line-height:1.7;}

  /* header */
  .hdr{position:sticky; top:0; background:rgba(14,17,22,.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:14px 16px; z-index:5;}
  .hdr-row{display:flex; justify-content:space-between; align-items:center;}
  .hdr-title{font-size:18px; font-weight:700;}
  .hdr-date{font-size:12px; color:var(--dim);}
  .icon-btn{background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:9px; padding:7px 11px; font-size:13px;}

  .wrap{padding:16px; max-width:560px; margin:0 auto;}
  .hero{background:linear-gradient(135deg,#13301f,#161b22); border:1px solid var(--line); border-radius:16px; padding:20px; text-align:center; margin-bottom:16px;}
  .hero-label{color:var(--dim); font-size:14px;}
  .hero-num{font-size:38px; font-weight:800; color:var(--accent); margin-top:4px;}
  .stale{color:var(--warn); font-size:12px; margin-top:8px;}

  .sec{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:14px;}
  .sec-h{display:flex; justify-content:space-between; align-items:center; font-size:15px; font-weight:700; margin-bottom:10px;}
  .sec-h .pill{background:var(--card2); color:var(--dim); font-size:12px; font-weight:600; border-radius:20px; padding:2px 10px;}
  .row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-top:1px solid var(--line); font-size:14px;}
  .row:first-of-type{border-top:0;}
  .row .sub{color:var(--dim); font-size:12px;}
  .amt{font-weight:700; white-space:nowrap;}
  .amt.red{color:var(--red);} .amt.warn{color:var(--warn);} .amt.green{color:var(--accent);}
  .empty{color:var(--dim); font-size:13px; text-align:center; padding:8px;}

  /* expense bars */
  .bar-row{margin:9px 0;}
  .bar-top{display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;}
  .bar{height:8px; background:var(--card2); border-radius:6px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--accent2); border-radius:6px;}

  /* chat */
  .chat-msgs{display:flex; flex-direction:column; gap:8px; margin-bottom:10px; max-height:300px; overflow-y:auto;}
  .msg{max-width:82%; padding:9px 12px; border-radius:14px; font-size:14px; white-space:pre-wrap; word-break:break-word;}
  .msg.omer{align-self:flex-start; background:var(--accent2); color:#fff; border-bottom-right-radius:4px;}
  .msg.max{align-self:flex-end; background:var(--card2); border-bottom-left-radius:4px;}
  .msg .t{display:block; font-size:10px; opacity:.6; margin-top:3px;}
  .chat-bar{position:fixed; bottom:0; right:0; left:0; background:var(--card); border-top:1px solid var(--line); padding:10px 12px; display:flex; gap:8px; max-width:560px; margin:0 auto;}
  .chat-bar input{flex:1; background:var(--bg); border:1px solid var(--line); border-radius:22px; color:var(--txt); padding:11px 16px; font-size:15px;}
  .chat-bar button{background:var(--accent); color:#fff; border:0; border-radius:22px; padding:0 18px; font-size:15px; font-weight:600;}
  .toast{position:fixed; bottom:80px; right:50%; transform:translateX(50%); background:var(--card2); border:1px solid var(--line); color:var(--txt); padding:9px 16px; border-radius:20px; font-size:13px; opacity:0; transition:opacity .25s; z-index:20;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-box">
    <div class="setup-logo">💰</div>
    <div class="setup-title">מאקס</div>
    <div class="setup-sub">הגדרה חד-פעמית</div>
    <label class="setup-label">GitHub Token</label>
    <input id="s-token" class="setup-input" type="password" placeholder="ghp_xxxxxxxxxxxx" dir="ltr">
    <label class="setup-label">GitHub Username</label>
    <input id="s-owner" class="setup-input" type="text" value="miam-official-git" dir="ltr">
    <label class="setup-label">שם הריפו</label>
    <input id="s-repo" class="setup-input" type="text" value="max-finance" dir="ltr">
    <button class="setup-btn" onclick="doSetup()">התחבר</button>
    <div class="setup-err" id="setup-err"></div>
    <div class="setup-help">Token: <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens</a><br>הרשאות: <strong>Contents → Read &amp; Write</strong></div>
  </div>
</div>

<!-- MAIN -->
<div id="main" class="hidden">
  <div class="hdr"><div class="hdr-row">
    <div><div class="hdr-title">💰 מאקס</div><div class="hdr-date" id="hdr-date"></div></div>
    <button class="icon-btn" onclick="reload()">↻ רענן</button>
  </div></div>
  <div class="wrap" id="content"></div>
</div>

<div class="chat-bar hidden" id="chatbar">
  <input id="chat-in" type="text" placeholder="כתוב למאקס..." onkeydown="if(event.key==='Enter')sendMsg()">
  <button onclick="sendMsg()">שלח</button>
</div>
<div class="toast" id="toast"></div>

<script>
function getCfg(){ return JSON.parse(localStorage.getItem('max_cfg')||'null'); }
function setCfg(c){ localStorage.setItem('max_cfg', JSON.stringify(c)); }
var DATA_PATH='data/finance.json', dataSha=null, D=null;

function b64enc(s){ return btoa(encodeURIComponent(s).replace(/%([0-9A-F]{2})/g,function(_,p){return String.fromCharCode(parseInt(p,16));})); }
function b64dec(b){ return decodeURIComponent(atob(b.replace(/\n/g,'')).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join('')); }
function ils(n){ return '₪'+Math.round(n).toLocaleString('en-US'); }
function toast(t){ var e=document.getElementById('toast'); e.textContent=t; e.classList.add('show'); setTimeout(function(){e.classList.remove('show');},1800); }

async function ghGet(path){
  var c=getCfg(), url='https://api.github.com/repos/'+c.owner+'/'+c.repo+'/contents/'+path+'?t='+Date.now();
  var res=await fetch(url,{cache:'no-store',headers:{'Authorization':'token '+c.token,'Accept':'application/vnd.github.v3+json'}});
  if(res.status===404) return null;
  if(!res.ok){ var e=await res.json(); throw new Error(e.message||res.status); }
  var d=await res.json(); return {content:JSON.parse(b64dec(d.content)), sha:d.sha};
}
async function ghPut(path,content,sha){
  var c=getCfg(), body={message:'update finance',content:b64enc(JSON.stringify(content,null,2))};
  if(sha) body.sha=sha;
  var res=await fetch('https://api.github.com/repos/'+c.owner+'/'+c.repo+'/contents/'+path,{method:'PUT',
    headers:{'Authorization':'token '+c.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){ var e=await res.json(); throw new Error(e.message||res.status); }
  return (await res.json()).content.sha;
}

async function doSetup(){
  var token=document.getElementById('s-token').value.trim();
  var owner=document.getElementById('s-owner').value.trim();
  var repo=document.getElementById('s-repo').value.trim();
  var err=document.getElementById('setup-err');
  if(!token||!owner||!repo){ err.textContent='מלא את כל השדות'; err.style.display='block'; return; }
  document.querySelector('.setup-btn').textContent='...מתחבר';
  setCfg({token,owner,repo});
  try{ await load(); document.getElementById('setup').classList.add('hidden'); }
  catch(e){ err.textContent='שגיאה: '+e.message; err.style.display='block'; document.querySelector('.setup-btn').textContent='התחבר'; localStorage.removeItem('max_cfg'); }
}

async function load(){
  var r=await ghGet(DATA_PATH);
  if(!r) throw new Error('אין עדיין נתונים (finance.json)');
  D=r.content; dataSha=r.sha;
  document.getElementById('main').classList.remove('hidden');
  document.getElementById('chatbar').classList.remove('hidden');
  render();
}
async function reload(){ try{ await load(); toast('עודכן'); }catch(e){ toast('שגיאה'); } }

function render(){
  document.getElementById('hdr-date').textContent='עודכן: '+(D.generated_at||D.today||'');
  var h='';
  // hero
  h+='<div class="hero"><div class="hero-label">חייבים לנו</div><div class="hero-num">'+ils(D.owed_total||0)+'</div>';
  if(D.cache_date && D.cache_date!==D.today) h+='<div class="stale">נתונים מ-'+D.cache_date+' · אמור למאקס "רענן"</div>';
  h+='</div>';

  // events
  h+='<div class="sec"><div class="sec-h"><span>אירועים שעברו</span><span class="pill">'+(D.events_pending||[]).length+'</span></div>';
  if((D.events_pending||[]).length){ D.events_pending.forEach(function(e){
    h+='<div class="row"><div>'+e.name+'<div class="sub">אירוע '+e.date+'</div></div><div class="amt red">'+ils(e.owed)+'</div></div>';
  }); } else h+='<div class="empty">הכל שולם 🎉</div>';
  h+='</div>';

  // lessons
  var lp=D.lessons_pending||[]; var lt=lp.reduce(function(a,b){return a+b.amount;},0); var lc=lp.reduce(function(a,b){return a+b.count;},0);
  h+='<div class="sec"><div class="sec-h"><span>שיעורי פיתוח קול</span><span class="pill">'+lc+' שיעורים · '+ils(lt)+'</span></div>';
  if(lp.length){ lp.forEach(function(l){
    h+='<div class="row"><div>'+l.student+'<div class="sub">'+l.count+' שיעורים</div></div><div class="amt warn">'+ils(l.amount)+'</div></div>';
  }); } else h+='<div class="empty">הכל שולם 🎉</div>';
  h+='</div>';

  // receipts
  h+='<div class="sec"><div class="sec-h"><span>קבלות לפתוח</span></div>';
  h+='<div class="row"><div>שיעורים ששולמו, אין קבלה</div><div class="amt">'+(D.lessons_no_receipt||0)+'</div></div>';
  if((D.events_no_receipt||[]).length) h+='<div class="row"><div>אירועים ששולמו, אין קבלה</div><div class="amt">'+D.events_no_receipt.join(', ')+'</div></div>';
  h+='</div>';

  // expenses
  var cats=D.expenses_by_cat||{}; var keys=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a];}); var mx=Math.max.apply(null,keys.map(function(k){return cats[k];}).concat([1]));
  h+='<div class="sec"><div class="sec-h"><span>הוצאות '+(D.month||'')+'</span><span class="pill">'+ils(D.expenses_total||0)+'</span></div>';
  keys.forEach(function(k){ h+='<div class="bar-row"><div class="bar-top"><span>'+k+'</span><span>'+ils(cats[k])+'</span></div><div class="bar"><div class="bar-fill" style="width:'+(cats[k]/mx*100)+'%"></div></div></div>'; });
  h+='</div>';

  // chat
  h+='<div class="sec"><div class="sec-h"><span>💬 צ\'אט עם מאקס</span></div><div class="chat-msgs" id="chat-msgs"></div><div class="empty" style="font-size:12px">מאקס יקרא ויענה בפעם הבאה שתפתח אותו בקלוד</div></div>';

  document.getElementById('content').innerHTML=h;
  renderChat();
}

function renderChat(){
  var box=document.getElementById('chat-msgs'); if(!box) return;
  var m=D.messages||[]; box.innerHTML='';
  m.slice(-30).forEach(function(x){
    var d=document.createElement('div'); d.className='msg '+(x.from==='omer'?'omer':'max');
    var time=(x.t||'').replace('T',' ').slice(5,16);
    d.innerHTML=x.text.replace(/</g,'&lt;')+'<span class="t">'+time+'</span>'; box.appendChild(d);
  });
  box.scrollTop=box.scrollHeight;
}

async function sendMsg(){
  var inp=document.getElementById('chat-in'); var t=inp.value.trim(); if(!t) return;
  inp.value='';
  if(!D.messages) D.messages=[];
  D.messages.push({from:'omer', text:t, t:new Date().toISOString()});
  renderChat();
  try{ dataSha=await ghPut(DATA_PATH, D, dataSha); toast('נשלח למאקס'); }
  catch(e){ toast('שגיאה בשליחה'); }
}

// boot
if(getCfg()){ load().then(function(){ document.getElementById('setup').classList.add('hidden'); }).catch(function(e){ document.getElementById('setup-err').textContent='שגיאה: '+e.message; document.getElementById('setup-err').style.display='block'; }); }
</script>
</body>
</html>
